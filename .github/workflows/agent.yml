name: regulatory-agent-worker

# GitHub's `schedule:` cron is unreliable for frequent polling — runs lag badly or get
# dropped entirely. So rather than depend on it, this workflow is a SELF-PERPETUATING
# CHAIN: each run polls the inbox once, then dispatches the next run. That keeps the
# agent polling every few minutes, reliably, with no external host.
#
# The re-dispatch needs a PAT (secret WORKER_PAT) because GitHub deliberately blocks the
# default GITHUB_TOKEN from triggering further workflow runs (anti-recursion). The
# schedule below is only a best-effort backup poll if the chain ever stops.
#
# Required secrets: GMAIL_ADDRESS, GMAIL_APP_PASSWORD, WORKER_PAT
# To (re)start the chain: trigger once via the Actions tab or `gh workflow run agent.yml`.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *" # best-effort backup only (GitHub cron is laggy)

concurrency:
  group: regulatory-agent-worker
  cancel-in-progress: false # chained runs queue instead of overlapping

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      HEADLESS: "true"
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Poll inbox once
        run: python -m regulatory_agent worker --once

      # Keep the chain alive. Runs even if the poll step failed (if: always), but only
      # from workflow_dispatch runs — schedule-triggered backups don't chain, so the
      # loop never widens into multiple parallel chains.
      - name: Dispatch the next run
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ secrets.WORKER_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::WORKER_PAT not set — self-chain disabled; only the laggy schedule backup will run."
            exit 0
          fi
          sleep 180                # cadence control: ~5-min loop (raise to slow it down)
          gh workflow run agent.yml --repo "${{ github.repository }}"
